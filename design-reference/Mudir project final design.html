    <script>
      // FOUC guard: set data-theme before any stylesheet loads so the first
      // paint uses the right palette. Mirrors hooks/useTheme.tsx. The stored
      // value is JSON (usehooks-ts useLocalStorage).
      try {
        var raw = localStorage.getItem('om:theme');
        // Mirror useTheme's default: usehooks-ts doesn't persist 'system'
        // until the toggle is used, so absent = 'system'.
        var pref = raw ? JSON.parse(raw) : 'system';
        var dark =
          pref === 'dark' ||
          (pref === 'system' &&
            matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        // Pre-CSS canvas color: until tokens.css loads, the UA paints the
        // default white canvas, which flashes on a dark hard-reload. Inline
        // values mirror tokens.css --om-bg-app; useTheme clears this once
        // the app mounts so the stylesheet owns the background again.
        document.documentElement.style.background = dark
          ? '#1c1b19'
          : '#faf9f5';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.background = '#faf9f5';
      }
    </script>
